/leader/controller_manager:
  ros__parameters:
    update_rate: 100  # Increased to 100Hz for smooth teleoperation

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leader_effort_controller:
      type: forward_command_controller/ForwardCommandController

/leader/joint_state_broadcaster:
  ros__parameters:
    joints:
      - leader_rotation1
      - leader_rotation2
      - leader_rotation3
      - leader_rotation4
      - leader_rotation5
      - leader_rotation6
      - leader_rotation7
    interface_name: effort

/leader/leader_effort_controller:
  ros__parameters:
    joints:
      - leader_rotation1
      - leader_rotation2
      - leader_rotation3
      - leader_rotation4
      - leader_rotation5
      - leader_rotation6
      - leader_rotation7
    interface_name: effort